<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>OCI Live-Track Provisioner Portal</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
    <style>
        .terminal-box {
            background-color: #1e1e1e;
            color: #39ff14;
            font-family: 'Courier New', Courier, monospace;
            height: 250px;
            overflow-y: scroll;
            font-size: 0.85rem;
            border-radius: 8px;
            padding: 12px;
            border: 1px solid #333;
        }
    </style>
    <script>
        let currentLogOffset = 0;

        function toggleShapeFields() {
            var shape = document.getElementById("shapeSelector").value;
            var cpuInput = document.getElementById("ocpus");
            var ramInput = document.getElementById("memory");

            if (shape === "VM.Standard.E2.1.Micro") {
                cpuInput.value = 1; ramInput.value = 1;
                cpuInput.disabled = true; ramInput.disabled = true;
            } else {
                cpuInput.value = 4; ramInput.value = 24;
                cpuInput.disabled = false; ramInput.disabled = false;
            }
            // Wipe OS selection if shape flips so user rescans appropriate arch
            document.getElementById("imageSelector").innerHTML = "<option value=''>-- Click Scan OS Button Above --</option>";
        }

        function parseRawConfig() {
            const rawText = document.getElementById("rawConfigInput").value;
            const userMatch = rawText.match(/user\s*=\s*(ocid1\.user\.[^\s#\n]+)/);
            const tenancyMatch = rawText.match(/tenancy\s*=\s*(ocid1\.tenancy\.[^\s#\n]+)/);
            const fingerprintMatch = rawText.match(/fingerprint\s*=\s*([a-fA-F0-9:]{47})/);
            const regionMatch = rawText.match(/region\s*=\s*([a-zA-Z0-9-]+)/);

            if (userMatch) document.getElementById("user").value = userMatch[1];
            if (tenancyMatch) document.getElementById("tenancy").value = tenancyMatch[1];
            if (fingerprintMatch) document.getElementById("fingerprint").value = fingerprintMatch[1];
            if (regionMatch) document.getElementById("region").value = regionMatch[1];
        }

        function handleKeyUpload(event) {
            const file = event.target.files[0];
            if (!file) return;
            const reader = new FileReader();
            reader.onload = function(e) {
                document.getElementById("private_key").value = e.target.result;
                document.getElementById("ssh_key").value = "ssh-rsa AAAAB3NzaC1yc2EAAAADAQABAAABgQC9 Generated-By-Automation sarak@oci";
            };
            reader.readAsText(file);
        }

        // Dynamic OS Discovery function execution

            parseRawConfig();
            const btn = document.getElementById("scanOSBtn");
            const selectEl = document.getElementById("imageSelector");
            btn.innerText = "⏳ Scanning Region OS Images...";
            btn.disabled = true;

            const payload = {
                user: document.getElementById("user").value,
                tenancy: document.getElementById("tenancy").value,
                fingerprint: document.getElementById("fingerprint").value,
                region: document.getElementById("region").value,
                private_key: document.getElementById("private_key").value,
                shape: document.getElementById("shapeSelector").value
            };

            try {
                const response = await fetch('/api/list-images', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(payload)
                });
                const result = await response.json();

                    selectEl.innerHTML = ""; //
