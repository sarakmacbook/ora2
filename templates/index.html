<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>OCI One-Click Auto Provisioner</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
    <script>
        function toggleShapeFields() {
            var shape = document.getElementById("shapeSelector").value;
            var cpuInput = document.getElementById("ocpus");
            var ramInput = document.getElementById("memory");

            if (shape === "VM.Standard.E2.1.Micro") {
                // Permanently force exact AMD free tier allotments
                cpuInput.value = 1;
                ramInput.value = 1;
                cpuInput.disabled = true;
                ramInput.disabled = true;
            } else {
                // Restore default editable ARM values
                cpuInput.value = 4;
                ramInput.value = 24;
                cpuInput.disabled = false;
                ramInput.disabled = false;
            }
        }

        function parseRawConfig() {
            const rawText = document.getElementById("rawConfigInput").value;
            
            const userMatch = rawText.match(/user\s*=\s*(ocid1\.user\.[^\s#\n]+)/);
            const tenancyMatch = rawText.match(/tenancy\s*=\s*(ocid1\.tenancy\.[^\s#\n]+)/);
            const fingerprintMatch = rawText.match(/fingerprint\s*=\s*([a-fA-F0-9:]{47})/);
            const regionMatch = rawText.match(/region\s*=\s*([a-zA-Z0-9-]+)/);

            if (userMatch) document.getElementById("user").value = userMatch[1];
            if (tenancyMatch) document.getElementById("tenancy").value = tenancyMatch[1];
            if (fingerprintMatch) document.getElementById("fingerprint").value = fingerprintMatch[1];
            if (regionMatch) document.getElementById("region").value = regionMatch[1];
        }

        function handleKeyUpload(event) {
            const file = event.target.files[0];
            if (!file) return;

            const reader = new FileReader();
            reader.onload = function(e) {
                document.getElementById("private_key").value = e.target.result;
                document.getElementById("ssh_key").value = "ssh-rsa AAAAB3NzaC1yc2EAAAADAQABAAABgQC9 Generated-By-Automation sarak@oci";
            };
            reader.readAsText(file);
        }

        async function startFullyAutomatedLoop() {
            parseRawConfig();
            
            const btn = document.getElementById("actionBtn");
            const storageAlert = document.getElementById("storageAlert");
            btn.innerText = "⏳ Scanning Block Storage & Discovering Assets...";
            btn.disabled = true;

            const payload = {
                user: document.getElementById("user").value,
                tenancy: document.getElementById("tenancy").value,
                fingerprint: document.getElementById("fingerprint").value,
                region: document.getElementById("region").value,
                private_key: document.getElementById("private_key").value,
                shape: document.getElementById("shapeSelector").value,
                display_name: document.getElementById("display_name").value,
                ocpus: document.getElementById("ocpus").value,
                memory: document.getElementById("memory").value,
                boot_volume_gb: document.getElementById("boot_volume_gb").value,
                ssh_key: document.getElementById("ssh_key").value
            };

            try {
                const response = await fetch('/api/auto-launch-loop', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(payload)
                });
                const result = await response.json();
                
                if (result.success) {
                    storageAlert.className = "alert alert-info mt-3 d-block";
                    storageAlert.innerHTML = `📊 <b>Storage Utilization Scan:</b> Used: ${result.storage_used_gb} GB / 200 GB limit. Remaining: ${result.storage_remaining_gb} GB.`;
                    alert("🎉 Background creation loops activated successfully!");
                } else {
                    alert("❌ Deployment failed: " + result.error);
                }
            } catch (err) {
                alert("❌ Request Error: " + err.message);
            } finally {
                btn.innerText = "🚀 Start Continuous Provisioning Loop";
                btn.disabled = false;
            }
        }
    </script>
</head>
<body class="bg-light p-4">
    <div class="container" style="max-width: 650px;">
        <div class="card shadow-lg border-0 rounded-4">
            <div class="card-header bg-dark text-white p-3 rounded-top-4">
                <h4 class="mb-0 text-center text-warning fw-bold">🎯 OCI Secure Smart-Drop Loop Tool</h4>
            </div>
            <div class="card-body p-4">
                
                <div class="bg-dark p-3 rounded-3 mb-4 text-white">
                    <h5 class="text-warning">1. Drop Credentials & Config File</h5>
                    <div class="mb-3">
                        <label class="form-label text-white-50">Paste raw text configuration block:</label>
                        <textarea id="rawConfigInput" class="form-control bg-secondary text-white border-0" rows="3" placeholder="Paste config text here..." oninput="parseRawConfig()"></textarea>
                    </div>
                    <div class="mb-2">
                        <label class="form-label text-white-50">Upload downloaded (.pem) Private Key file:</label>
                        <input type="file" class="form-control bg-secondary text-white border-0" accept=".pem" onchange="handleKeyUpload(event)">
                    </div>
                </div>

                <div class="bg-warning-subtle p-3 mb-4 rounded-3 border">
                    <h5 class="text-dark">2. Custom Shape Allocations</h5>
                    <div class="row">
                        <div class="col-md-6 mb-2">
                            <label class="form-label">Instance Tier Profile</label>
                            <select id="shapeSelector" class="form-select" onchange="toggleShapeFields()" required>
                                <option value="VM.Standard.A1.Flex">Ampere ARM Always Free (Flexible)</option>
                                <option value="VM.Standard.E2.1.Micro">AMD Standard Micro Always Free</option>
                            </select>
                        </div>
                        <div class="col-md-6 mb-2">
                            <label class="form-label">Boot Volume Allocated Size (GB)</label>
                            <input type="number" id="boot_volume_gb" class="form-control" value="50" min="47" max="200">
                        </div>
                        <div class="col-md-4 mb-2">
                            <label class="form-label">VM Name Tag</label>
                            <input type="text" id="display_name" class="form-control" value="AlwaysFree-Bot">
                        </div>
                        <div class="col-md-4 mb-2">
                            <label class="form-label">OCPUs</label>
                            <input type="number" id="ocpus" class="form-control" value="4">
                        </div>
                        <div class="col-md-4 mb-2">
                            <label class="form-label">RAM (GB)</label>
                            <input type="number" id="memory" class="form-control" value="24">
                        </div>
                    </div>
                </div>

                <input type="hidden" id="user"><input type="hidden" id="tenancy"><input type="hidden" id="fingerprint"><input type="hidden" id="region">
                <textarea id="private_key" style="display:none;"></textarea><input type="hidden" id="ssh_key">

                <button type="button" id="actionBtn" class="btn btn-primary w-100 btn-lg py-3 fw-bold rounded-3" onclick="startFullyAutomatedLoop()">🚀 Start Continuous Provisioning Loop</button>
                
                <div id="storageAlert" class="alert alert-info mt-3 d-none" role="alert"></div>
            </div>
        </div>
    </div>
</body>
</html>
